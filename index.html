<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JHAPA-5 LIVE – Oli vs Balen</title>
  <meta name="description" content="Jhapa-5 live vote counting – Oli vs Balen (TV screen)." />

  <style>
    :root{
      --bg:#05070d;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.62);

      --live:#ff3b3b;
      --oli:#38bdf8;     /* cyan */
      --balen:#facc15;   /* yellow */
      --shadow: 0 20px 90px rgba(0,0,0,0.60);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 520px at 10% -10%, rgba(250,204,21,0.12), transparent 62%),
        radial-gradient(900px 520px at 100% 0%, rgba(56,189,248,0.12), transparent 60%),
        linear-gradient(180deg, #060a12, #03050a);
      min-height: 100vh;
      padding: 18px 10px 40px;
    }

    .wrap{ max-width: 1100px; margin: 0 auto; }
    .tv{
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* TOP BAR */
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.20);
    }
    .left{ display:flex; align-items:center; gap:12px; min-width:0; }
    .logo{
      width:44px;height:44px;border-radius:14px;
      display:grid; place-items:center;
      background: linear-gradient(135deg, rgba(250,204,21,0.95), rgba(250,204,21,0.35));
      color:#0b1220; font-weight: 950;
      letter-spacing: .5px;
      flex:0 0 auto;
    }
    .titleBox{ min-width:0; }
    .h1{
      margin:0;
      font-weight: 950;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height:1.1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .sub{
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .right{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
    }
    .btn{
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 9px 12px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 12px;
      cursor:pointer;
    }
    .btn:hover{ background: rgba(255,255,255,0.09); }

    .liveBug{
      display:flex; align-items:center; gap:8px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.20);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .08em;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;
      background: var(--live);
      box-shadow: 0 0 0 6px rgba(255,59,59,0.14);
      animation: pulse 1.1s infinite;
    }
    @keyframes pulse{
      0%{ transform: scale(1); opacity: 1; }
      50%{ transform: scale(1.15); opacity: .85; }
      100%{ transform: scale(1); opacity: 1; }
    }

    /* BODY */
    .body{
      padding: 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .score{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      border-radius: 18px;
      padding: 14px;
    }

    .kpis{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    @media (max-width: 720px){ .kpis{ grid-template-columns: repeat(2, 1fr); } }

    .kpi{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 12px;
    }
    .kLbl{ font-size: 12px; color: rgba(255,255,255,0.62); }
    .kVal{
      margin-top: 6px;
      font-size: clamp(20px, 3.2vw, 36px);
      font-weight: 950;
      letter-spacing: .2px;
      font-variant-numeric: tabular-nums;
      line-height: 1.05;
    }

    .candWrap{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.14);
      border-radius: 18px;
      overflow:hidden;
    }

    .cand{
      display:grid;
      grid-template-columns: 1.6fr 5fr 1.1fr;
      gap: 10px;
      align-items:center;
      padding: 14px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .cand:first-child{ border-top: none; }

    .who{ min-width:0; }
    .name{
      font-weight: 950;
      font-size: 18px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .party{
      margin-top: 4px;
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .barBg{
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      overflow:hidden;
      position:relative;
    }
    .bar{
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 900ms cubic-bezier(.2,.9,.2,1);
      will-change: width;
    }
    .bar.oli{ background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(56,189,248,0.35)); }
    .bar.balen{ background: linear-gradient(90deg, rgba(250,204,21,0.95), rgba(250,204,21,0.40)); }

    .nums{
      text-align:right;
      font-variant-numeric: tabular-nums;
    }
    .votes{
      font-weight: 950;
      font-size: 22px;
      line-height: 1.1;
    }
    .pct{
      margin-top: 5px;
      font-size: 12px;
      font-weight: 900;
      color: rgba(255,255,255,0.70);
    }

    .error{
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,59,59,0.10);
    }

    footer{
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      text-align:center;
      background: rgba(0,0,0,0.16);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="tv">
      <div class="top">
        <div class="left">
          <div class="logo">NE</div>
          <div class="titleBox">
            <div class="h1">JHAPA–5 LIVE COUNTING</div>
            <div class="sub">OLI vs BALEN • TV result screen • data/jhapa5.json</div>
          </div>
        </div>

        <div class="right">
          <div class="liveBug"><span class="dot"></span>LIVE</div>
          <div class="pill" id="statusPill">Status: Waiting…</div>
          <div class="pill" id="lastUpdated">Last updated: —</div>
          <button class="btn" id="btnRefresh" type="button">Refresh</button>
        </div>
      </div>

      <div class="body">
        <section class="score" aria-label="Jhapa-5 live scoreboard">
          <div class="kpis">
            <div class="kpi">
              <div class="kLbl">Total votes counted</div>
              <div class="kVal" id="kTotal">0</div>
            </div>
            <div class="kpi">
              <div class="kLbl">Reporting</div>
              <div class="kVal" id="kReporting">0.0%</div>
            </div>
            <div class="kpi">
              <div class="kLbl">Leader</div>
              <div class="kVal" id="kLeader">—</div>
            </div>
            <div class="kpi">
              <div class="kLbl">Lead</div>
              <div class="kVal" id="kLead">—</div>
            </div>
          </div>

          <div class="candWrap" id="candWrap">
            <!-- OLI -->
            <div class="cand">
              <div class="who">
                <div class="name" id="oliName">OLI</div>
                <div class="party" id="oliParty">—</div>
              </div>
              <div class="barBg">
                <div class="bar oli" id="oliBar"></div>
              </div>
              <div class="nums">
                <div class="votes" id="oliVotes">0</div>
                <div class="pct" id="oliPct">0.0%</div>
              </div>
            </div>

            <!-- BALEN -->
            <div class="cand">
              <div class="who">
                <div class="name" id="balenName">BALEN</div>
                <div class="party" id="balenParty">—</div>
              </div>
              <div class="barBg">
                <div class="bar balen" id="balenBar"></div>
              </div>
              <div class="nums">
                <div class="votes" id="balenVotes">0</div>
                <div class="pct" id="balenPct">0.0%</div>
              </div>
            </div>
          </div>
        </section>
      </div>

      <footer>
        Independent informational display • Official results: Election Commission of Nepal
      </footer>
    </div>
  </div>

  <script>
    // ==========================
    // CONFIG
    // ==========================
    const CONFIG = {
      url: "./data/jhapa5.json",
      pollMs: 5000
    };

    // ==========================
    // Utils
    // ==========================
    const $ = (id) => document.getElementById(id);
    const num = (x) => (Number.isFinite(Number(x)) ? Number(x) : 0);
    const s = (x) => (x === null || x === undefined) ? "" : String(x);

    function fmtInt(n){
      n = Math.round(num(n));
      return n.toLocaleString("en-US");
    }

    function fmtPct(x){
      const v = Math.round(num(x) * 10) / 10;
      return v.toFixed(1) + "%";
    }

    // TV number count-up/down
    function animateNumber(el, from, to, ms=700){
      if(!el) return;
      from = num(from); to = num(to);
      const start = performance.now();
      const diff = to - from;

      function step(t){
        const p = Math.min(1, (t - start) / ms);
        const e = 1 - Math.pow(1 - p, 3); // easeOutCubic
        const val = Math.round(from + diff * e);
        el.textContent = fmtInt(val);
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ==========================
    // State for animations
    // ==========================
    const prev = {
      oli: 0,
      balen: 0,
      total: 0
    };

    // ==========================
    // Expected JSON format:
    // {
    //   "lastUpdated": "2026-03-05 20:22 NPT",
    //   "reportingPct": 34.5,
    //   "oli":   { "name":"KP Oli", "party":"UML", "votes":12345 },
    //   "balen": { "name":"Balen Shah", "party":"Independent", "votes":11200 }
    // }
    // ==========================
    function normalize(raw){
      const model = {
        lastUpdated: null,
        reportingPct: 0,
        oli: { name:"OLI", party:"—", votes:0 },
        balen:{ name:"BALEN", party:"—", votes:0 }
      };
      if(!raw || typeof raw !== "object") return model;

      model.lastUpdated = raw.lastUpdated || raw.updated || raw.timestamp || null;
      model.reportingPct = num(raw.reportingPct || raw.reporting || raw.progress || 0);

      const o = raw.oli || (raw.candidates && (raw.candidates.oli || raw.candidates.Oli)) || {};
      const b = raw.balen || (raw.candidates && (raw.candidates.balen || raw.candidates.Balen)) || {};

      model.oli = {
        name: (s(o.name).trim() || "OLI"),
        party: (s(o.party).trim() || "—"),
        votes: num(o.votes || o.count || o.total || 0)
      };
      model.balen = {
        name: (s(b.name).trim() || "BALEN"),
        party: (s(b.party).trim() || "—"),
        votes: num(b.votes || b.count || b.total || 0)
      };

      return model;
    }

    function render(model){
      // Labels
      $("oliName").textContent = model.oli.name.toUpperCase();
      $("oliParty").textContent = model.oli.party;
      $("balenName").textContent = model.balen.name.toUpperCase();
      $("balenParty").textContent = model.balen.party;

      // Totals
      const oliVotes = num(model.oli.votes);
      const balenVotes = num(model.balen.votes);
      const total = oliVotes + balenVotes;
      const denom = total || 1;

      const oliPct = (oliVotes / denom) * 100;
      const balenPct = (balenVotes / denom) * 100;

      // Animate numbers
      animateNumber($("oliVotes"), prev.oli, oliVotes, 750);
      animateNumber($("balenVotes"), prev.balen, balenVotes, 750);
      animateNumber($("kTotal"), prev.total, total, 750);

      prev.oli = oliVotes;
      prev.balen = balenVotes;
      prev.total = total;

      // Pcts
      $("oliPct").textContent = fmtPct(oliPct);
      $("balenPct").textContent = fmtPct(balenPct);

      // Bars
      $("oliBar").style.width = Math.max(0, Math.min(100, oliPct)) + "%";
      $("balenBar").style.width = Math.max(0, Math.min(100, balenPct)) + "%";

      // Reporting
      const rp = Math.max(0, Math.min(100, num(model.reportingPct)));
      $("kReporting").textContent = fmtPct(rp);

      // Leader + lead margin
      let leader = "—";
      let lead = "—";
      const diff = oliVotes - balenVotes;
      if (total > 0){
        if (diff > 0){
          leader = model.oli.name.toUpperCase();
          lead = "+" + fmtInt(diff);
        } else if (diff < 0){
          leader = model.balen.name.toUpperCase();
          lead = "+" + fmtInt(Math.abs(diff));
        } else {
          leader = "TIED";
          lead = "0";
        }
      }
      $("kLeader").textContent = leader;
      $("kLead").textContent = lead;

      // Last updated
      const last = model.lastUpdated ? s(model.lastUpdated) : new Date().toLocaleString();
      $("lastUpdated").textContent = "Last updated: " + last;

      // Status
      $("statusPill").textContent = total > 0 ? "Status: LIVE updating" : "Status: Awaiting first update";

      // Clear error styling
      $("candWrap").classList.remove("error");
    }

    function renderError(){
      $("statusPill").textContent = "Status: Feed error";
      $("candWrap").classList.add("error");
    }

    async function loadOnce(){
      try{
        $("statusPill").textContent = "Status: Loading…";
        const res = await fetch(`${CONFIG.url}?v=${Date.now()}`, { cache: "no-store" });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const raw = await res.json();
        render(normalize(raw));
      }catch(e){
        console.error(e);
        renderError();
      }
    }

    $("btnRefresh").addEventListener("click", loadOnce);

    loadOnce();
    setInterval(loadOnce, CONFIG.pollMs);
  </script>
</body>
</html>
